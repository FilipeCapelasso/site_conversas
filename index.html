<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Privado Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: #0b141a; 
      color: #e9edef; 
      display: flex; 
      height: 100vh; 
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar { 
      width: 300px; 
      background: #111b21; 
      border-right: 1px solid #2a3942; 
      display: flex; 
      flex-direction: column; 
    }
    .sidebar-header { padding: 15px; background: #202c33; font-weight: bold; font-size: 18px; }
    #search-box { padding: 10px; position: relative; }
    #search-user { 
      width: 100%; background: #2a3942; border: none; padding: 10px; 
      border-radius: 8px; color: white; outline: none;
    }
    #suggestions { 
      position: absolute; top: 50px; left: 10px; right: 10px; 
      background: #2a3942; border-radius: 8px; list-style: none; 
      z-index: 10; max-height: 200px; overflow-y: auto; display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    #suggestions li { padding: 12px; cursor: pointer; border-bottom: 1px solid #3b4a54; }
    #suggestions li:hover { background: #3b4a54; }

    /* Área do Chat */
    #chat-area { flex: 1; display: flex; flex-direction: column; }
    #chat-header { 
      padding: 15px; background: #202c33; display: flex; 
      justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3942;
    }
    #messages { 
      flex: 1; overflow-y: auto; padding: 20px; 
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      display: flex; flex-direction: column; gap: 10px;
    }

    /* Bolhas */
    .msg-box { max-width: 75%; padding: 8px 12px; font-size: 15px; border-radius: 10px; position: relative; }
    .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 0; }
    .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 0; }

    /* Form */
    #form { background: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
    #input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
    
    .btn-action { background: #00a884; color: #111b21; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    .btn-delete { background: #ea0038; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; border: none; cursor: pointer; }

    #login-screen { position: fixed; inset: 0; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    img, video { max-width: 100%; border-radius: 5px; margin-top: 5px; display: block; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2 style="margin-bottom:20px;">Chat Privado</h2>
    <input id="user-name" placeholder="Usuário" style="padding:12px; margin:5px; width:280px; border-radius:5px; border:none; background:#2a3942; color:white;">
    <input id="user-pass" type="password" placeholder="Senha" style="padding:12px; margin:5px; width:280px; border-radius:5px; border:none; background:#2a3942; color:white;">
    <button onclick="fazerLogin()" class="btn-action" style="width:280px; margin-top:10px;">Entrar / Cadastrar</button>
    <p id="login-status" style="margin-top:10px; color:#00a884;"></p>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">Conversas</div>
    <div id="search-box">
      <input id="search-user" placeholder="🔍 Buscar usuário..." oninput="buscarUsuariosSugestao()">
      <ul id="suggestions"></ul>
    </div>
    <div style="padding: 15px; cursor: pointer; background: #2a3942;" onclick="window.location.search = ''">🌎 Chat Global</div>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <span id="chat-title">Carregando...</span>
      <button id="del-btn" class="btn-delete" style="display:none;" onclick="apagarHistoricoParaAmbos()">Apagar para todos</button>
    </div>
    <ul id="messages"></ul>
    <form id="form">
      <input type="file" id="file-input" style="display:none;" accept="image/*,video/*">
      <button type="button" onclick="document.getElementById('file-input').click()" style="background:transparent; font-size:24px; border:none; cursor:pointer;">📎</button>
      <input id="input" autocomplete="off" placeholder="Digite uma mensagem..." />
      <button type="submit" class="btn-action">Enviar</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let currentUser = "";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyYCFGzonXJFsyzuCcI_zRbtf0oKwAfCeV4OaHFa6EHz0XaeyasPsgfJpTqEmHut_q/exec";

    async function fazerLogin() {
      const user = document.getElementById('user-name').value.trim();
      const pass = document.getElementById('user-pass').value.trim();
      if(!user || !pass) return alert("Preencha tudo!");
      
      document.getElementById('login-status').innerText = "Autenticando...";
      try {
        const res = await fetch(`${SCRIPT_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`, { redirect: 'follow' });
        const data = await res.json();
        if (data.status === "success") {
          currentUser = user;
          document.getElementById('login-screen').style.display = 'none';
          iniciarChat();
        } else {
          alert(data.message);
          document.getElementById('login-status').innerText = "";
        }
      } catch (e) { alert("Erro de conexão."); }
    }

    // BUSCA PREDITIVA NA PLANILHA
    async function buscarUsuariosSugestao() {
      const query = document.getElementById('search-user').value.trim();
      const sugList = document.getElementById('suggestions');
      if (query.length < 1) { sugList.style.display = "none"; return; }

      try {
        const res = await fetch(`${SCRIPT_URL}?action=buscarUsuarios&query=${encodeURIComponent(query)}`, { redirect: 'follow' });
        const data = await res.json();
        if(data.status === "success" && data.data.length > 0) {
          sugList.innerHTML = data.data
            .filter(u => u !== currentUser)
            .map(u => `<li onclick="irParaPrivado('${u}')">${u}</li>`).join('');
          sugList.style.display = "block";
        } else { sugList.style.display = "none"; }
      } catch(e) { console.error("Erro na busca"); }
    }

    function irParaPrivado(target) {
      const room = [currentUser, target].sort().join('_');
      window.location.search = `?room=${room}&target=${target}`;
    }

    function iniciarChat() {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room') || 'global';
      const target = urlParams.get('target');

      document.getElementById('chat-title').innerText = target ? `Conversa com ${target}` : "🌎 Chat Global";
      if(target) document.getElementById('del-btn').style.display = "block";

      socket = io({ query: { room: room, username: currentUser } });

      // Envio de arquivos e texto... (Lógica de socket idêntica à anterior)
      document.getElementById('form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('input');
        if(input.value.trim()) {
          socket.emit('chat message', { text: input.value });
          input.value = '';
        }
      };

      socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.className = `msg-box ${data.username === currentUser ? 'sent' : 'received'}`;
        item.innerHTML = `<small style="display:block;color:#8696a0;font-weight:bold;">${data.username}</small><span>${data.text}</span>`;
        document.getElementById('messages').appendChild(item);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      });

      // Lógica de apagar histórico em tempo real
      socket.on('clear messages', () => {
        document.getElementById('messages').innerHTML = "";
      });
    }

    function apagarHistoricoParaAmbos() {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room');
      if(room && confirm("Isso apagará as mensagens para ambos AGORA. Continuar?")) {
        socket.emit('request clear', room);
      }
    }
  </script>
</body>
</html>
