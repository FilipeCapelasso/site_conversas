<body>
  <div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0b141a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
    <h2 style="margin-bottom:20px;">Entrar no Chat</h2>
    <input id="user-name" placeholder="Usuário" style="padding:10px; margin:5px; border-radius:5px; border:none; width:250px;">
    <input id="user-pass" type="password" placeholder="Senha" style="padding:10px; margin:5px; border-radius:5px; border:none; width:250px;">
    <button onclick="fazerLogin()">Entrar / Cadastrar</button>
    <p id="login-status" style="margin-top:10px; font-size:12px; color:#00a884;"></p>
  </div>

  <div style="background:#202c33; padding:10px; display:flex; align-items:center; gap:10px;">
    <input id="search-user" placeholder="🔍 Buscar usuário..." style="flex:1; background:#2a3942; border:none; color:white; padding:8px; border-radius:20px;">
    <button onclick="iniciarPrivado()" style="margin:0; padding:5px 15px;">Ir</button>
  </div>

  <ul id="messages"></ul>

  <form id="form">
    <input type="file" id="file-input" style="display:none;" accept="image/*,video/*">
    <button type="button" onclick="document.getElementById('file-input').click()" style="background:transparent; color:#8696a0; font-size:24px; padding:0 10px;">📎</button>
    <input id="input" autocomplete="off" placeholder="Digite sua mensagem..." />
    <button type="submit">Enviar</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let currentUser = "";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxV-Ox_q-hQZRCg0WyE6vERuvs3S_aGbfJOzlEQgNmNQP44VuKOL8bxweC1sVCWY1Z/exec";

    async function fazerLogin() {
      const user = document.getElementById('user-name').value;
      const pass = document.getElementById('user-pass').value;
      if(!user || !pass) return alert("Preencha tudo!");

      document.getElementById('login-status').innerText = "Verificando...";
      
      try {
        const res = await fetch(`${SCRIPT_URL}?user=${user}&pass=${pass}`);
        const data = await res.json();

        if (data.status === "success") {
          currentUser = user;
          document.getElementById('login-screen').style.display = 'none';
          conectarSocket();
        } else {
          alert("Erro: " + data.message);
          document.getElementById('login-status').innerText = "";
        }
      } catch (e) {
        alert("Erro na conexão com a planilha.");
      }
    }

    function conectarSocket() {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room') || 'global';
      
      socket = io({ query: { room: room, username: currentUser } });

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const fileInput = document.getElementById('file-input');
      const messagesList = document.getElementById('messages');

      // Envio de arquivos
      fileInput.onchange = () => {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
          socket.emit('chat message', {
            file: e.target.result,
            fileType: file.type.split('/')[0],
            text: `Enviou um(a) ${file.type.split('/')[0]}`
          });
        };
        reader.readAsDataURL(file);
      };

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value.trim()) {
          socket.emit('chat message', { text: input.value });
          input.value = '';
        }
      });

      socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.classList.add('msg-box');
        item.classList.add(data.senderId === socket.id ? 'sent' : 'received');

        // Adiciona nome do usuário em cima
        let content = `<small style="display:block; color:#8696a0; font-size:10px; margin-bottom:4px;">${data.username}</small>`;

        if (data.file) {
          if (data.fileType === 'image') content += `<img src="${data.file}" style="max-width:100%; border-radius:5px;">`;
          else if (data.fileType === 'video') content += `<video src="${data.file}" controls style="max-width:100%; border-radius:5px;"></video>`;
        } else {
          content += `<span>${data.text}</span>`;
        }

        item.innerHTML = content;
        messagesList.appendChild(item);
        messagesList.scrollTop = messagesList.scrollHeight;
      });
    }

    function iniciarPrivado() {
      const target = document.getElementById('search-user').value;
      if(target) {
        // Cria uma sala única baseada nos dois nomes em ordem alfabética
        const room = [currentUser, target].sort().join('_');
        window.location.search = `?room=${room}`;
      }
    }
  </script>
</body>
