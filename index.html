<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat Privado Pro - Cyber Cyan</title>
  <style>
    :root {
      --bg-dark: #050505;
      --panel-dark: #0d1117;
      --neon-cyan: #00f2ff;
      --neon-cyan-glow: rgba(0, 242, 255, 0.4);
      --neon-border: rgba(0, 242, 255, 0.2);
      --text-main: #e0e0e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    #sidebar { width: 320px; background: var(--panel-dark); border-right: 2px solid var(--neon-border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; background: #161b22; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-cyan); }
    
    #search-user { width: 100%; background: #161b22; border: 1px solid var(--neon-border); padding: 12px; border-radius: 4px; color: white; outline: none; transition: 0.3s; }
    #search-user:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan-glow); }

    #contacts-list { flex: 1; overflow-y: auto; }
    .contact-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
    .contact-item.active { background: linear-gradient(90deg, rgba(0, 242, 255, 0.1), transparent); border-left: 3px solid var(--neon-cyan); }

    #chat-area { flex: 1; display: flex; flex-direction: column; background: #000; }
    #chat-header { padding: 15px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-border); }

    #messages { flex: 1; overflow-y: auto; padding: 20px; background: #000; display: flex; flex-direction: column; gap: 15px; list-style: none; }
    
    .msg-box { max-width: 75%; padding: 10px 15px; border-radius: 8px; font-size: 15px; border: 1px solid transparent; word-wrap: break-word; }
    .sent { align-self: flex-end; background: rgba(0, 242, 255, 0.1); border-color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }
    .received { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border-color: #444; }

    /* ESTILO DO NOME DO USUÁRIO CORRIGIDO */
    .user-clickable { display: block; font-weight: bold; color: #000 !important; font-size: 13px !important; margin-bottom: 5px; cursor: pointer; text-transform: uppercase; background: var(--neon-cyan); padding: 2px 6px; border-radius: 3px; width: fit-content; }

    .system-msg { align-self: center; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-size: 11px; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; background: rgba(0, 242, 255, 0.05); }

    #form { padding: 15px; background: #0d1117; border-top: 1px solid var(--neon-border); display: flex; gap: 10px; }
    #input { flex: 1; background: #161b22; border: 1px solid var(--neon-border); padding: 12px 20px; border-radius: 4px; color: white; outline: none; }
    .btn-send { background: var(--neon-cyan); color: #000; border: none; padding: 0 20px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px var(--neon-cyan); }

    #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .login-input { padding: 15px; margin: 10px; width: 300px; background: transparent; border: 1px solid var(--neon-cyan); color: white; border-radius: 4px; text-align: center; outline: none; }

    @media (max-width: 768px) { #sidebar { width: 100%; position: absolute; height: 100%; z-index: 5; } #chat-area { width: 100%; position: absolute; height: 100%; z-index: 1; display: none; } body.chat-open #sidebar { display: none; } body.chat-open #chat-area { display: flex; } }
  </style>
</head>
<body>

  <div id="profile-menu" style="position: fixed; background: #161b22; border: 1px solid var(--neon-cyan); border-radius: 4px; display: none; z-index: 2000; box-shadow: 0 0 20px var(--neon-cyan-glow);">
    <button id="btn-conversa" style="width: 100%; padding: 12px 20px; background: none; border: none; color: white; text-align: left; cursor: pointer;">ABRIR CHAT</button>
    <button id="btn-salvar" style="width: 100%; padding: 12px 20px; background: none; border: none; color: white; text-align: left; cursor: pointer; border-top: 1px solid #333;">SALVAR CONTATO</button>
  </div>

  <div id="login-screen">
    <h1 style="color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 30px; letter-spacing: 5px;">ACESSO AO SISTEMA</h1>
    <input id="user-name" class="login-input" type="text" placeholder="ID DE USUÁRIO" autocomplete="off">
    <input id="user-pass" class="login-input" type="password" placeholder="CHAVE DE ACESSO">
    <button onclick="fazerLogin()" class="btn-send" style="height: 50px; width: 300px; margin-top: 20px;">INICIALIZAR</button>
    <p id="login-status" style="margin-top:15px; color: var(--neon-cyan); font-size: 12px;"></p>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">
      <span style="color: var(--neon-cyan); font-weight: bold; letter-spacing: 2px;">TERMINAL</span>
      <button onclick="logout()" style="background:none; border:1px solid var(--neon-cyan); color:var(--neon-cyan); padding: 4px 8px; cursor:pointer; font-size:10px; text-transform: uppercase;">DESCONECTAR</button>
    </div>
    <div id="search-box">
      <input id="search-user" placeholder="BUSCAR USUÁRIO..." oninput="buscarUsuariosSugestao()" autocomplete="off">
      <ul id="suggestions" style="position: absolute; background: #161b22; width: 290px; border: 1px solid var(--neon-cyan); z-index: 100; list-style: none; display: none;"></ul>
    </div>
    <div class="contact-item" onclick="mudarSala('global')" id="item-global">
      <span style="color: var(--neon-cyan); font-weight: bold;">#</span> CHAT GLOBAL
    </div>
    <div class="section-title">RECENT_UPLOADS</div>
    <div id="contacts-list"></div>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <div style="display:flex; align-items:center;">
        <button id="back-btn" onclick="fecharChatNoCelular()" style="background:none; border:none; color:var(--neon-cyan); font-size:20px; margin-right:10px; cursor:pointer;">&lt;</button>
        <span id="chat-title" style="color: var(--neon-cyan); font-weight: bold; letter-spacing: 1px;">AGUARDANDO...</span>
      </div>
      <div class="header-actions">
        <button id="remove-contact-btn" style="display:none; background:transparent; color: #888; border:1px solid #444; padding:5px 10px; cursor:pointer; margin-right:5px; font-size: 10px;" onclick="removerContatoLocal()">Remover</button>
        <button id="del-btn" style="display:none; background:transparent; color: var(--neon-cyan); border:1px solid var(--neon-cyan); padding:5px 10px; cursor:pointer; font-size: 10px;" onclick="apagarHistoricoParaAmbos()">APAGAR TUDO</button>
      </div>
    </div>
    <ul id="messages"></ul>
    <form id="form">
      <input type="file" id="file-input" style="display:none;" accept="image/*,video/*">
      <button type="button" style="background:none; border:none; font-size:24px; color:var(--neon-cyan); cursor:pointer;" onclick="document.getElementById('file-input').click()">+</button>
      <input id="input" autocomplete="off" placeholder="Digite uma mensagem..." />
      <button type="submit" class="btn-send">ENVIAR</button>
    </form>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    let socket;
    let currentUser = "";

    function playErrorBeep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = 'sawtooth'; oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
    }

    window.onload = () => {
      const savedUser = localStorage.getItem('chat_user');
      const savedPass = localStorage.getItem('chat_pass');
      if (savedUser && savedPass) {
        currentUser = savedUser;
        document.getElementById('login-screen').style.display = 'none';
        renderizarContatos(); iniciarChat();
      }
    };

    async function fazerLogin() {
      const user = document.getElementById('user-name').value.trim();
      const pass = document.getElementById('user-pass').value.trim();
      if(!user || !pass) return;
      document.getElementById('login-status').innerText = "CONECTANDO...";
      try {
        const res = await fetch(`/api/login?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
        const data = await res.json();
        if (data.status === "success") {
          localStorage.setItem('chat_user', user); localStorage.setItem('chat_pass', pass);
          location.reload();
        } else { playErrorBeep(); alert(data.message); document.getElementById('login-status').innerText = ""; }
      } catch (e) { playErrorBeep(); alert("ERRO_DE_CONEXÃO"); }
    }

    function iniciarChat() {
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room') || 'global';
      const target = urlParams.get('target');
      document.getElementById('chat-title').innerText = target ? target.toUpperCase() : "GLOBAL_NET";
      document.getElementById('del-btn').style.display = (target && room !== 'global') ? "block" : "none";
      document.getElementById('remove-contact-btn').style.display = (target && room !== 'global') ? "block" : "none";
      document.getElementById('messages').innerHTML = "";
      renderizarContatos();
      if (socket) socket.disconnect();
      socket = io({ query: { room: room, username: currentUser } });
      configurarOuvintes();
    }

    function configurarOuvintes() {
      socket.on('chat message', (data) => {
        const item = document.createElement('li');
        const isMe = data.username === currentUser;
        if (data.isSystem) {
          item.className = "system-msg";
          item.innerHTML = `<span>${data.text}</span>`;
        } else {
          item.className = `msg-box ${isMe ? 'sent' : 'received'}`;
          let html = `<small class="user-clickable" onclick="abrirMenuPerfil(event, '${data.username}')">${data.username}</small>`;
          if (data.file) {
            if (data.fileType === 'image') html += `<img src="${data.file}" style="max-width:100%; border-radius:4px; border:1px solid var(--neon-cyan)">`;
            else if (data.fileType === 'video') html += `<video src="${data.file}" controls style="max-width:100%"></video>`;
          } else { html += `<span>${data.text}</span>`; }
          item.innerHTML = html;
        }
        document.getElementById('messages').appendChild(item);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      });
      socket.on('clear messages', () => { document.getElementById('messages').innerHTML = ""; });
    }

    function mudarSala(novaSala, target = null, autoPing = false) {
      if (target) salvarContatoSilencioso(target);
      const novaUrl = target ? `?room=${novaSala}&target=${target}` : `?room=global`;
      window.history.pushState({}, '', novaUrl);
      document.body.classList.add('chat-open');
      iniciarChat();
      if (autoPing && target) {
        setTimeout(() => { if (socket && socket.connected) socket.emit('chat message', { text: `ACESSO_PERMITIDO: ${currentUser} entrou.`, isSystem: true }); }, 600);
      }
    }

    async function buscarUsuariosSugestao() {
      const query = document.getElementById('search-user').value.trim();
      const sugList = document.getElementById('suggestions');
      if (query.length < 1) { sugList.style.display = "none"; return; }
      try {
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        if(data.status === "success" && data.data.length > 0) {
          sugList.innerHTML = data.data.filter(u => u.toLowerCase() !== currentUser.toLowerCase()).map(u => `<li style="padding:10px; cursor:pointer; color:white; border-bottom:1px solid #333;" onclick="mudarSala('${[currentUser, u].sort().join('_')}', '${u}', true)">ID: ${u}</li>`).join('');
          sugList.style.display = "block";
        } else { sugList.style.display = "none"; }
      } catch(e) { sugList.style.display = "none"; }
    }

    function renderizarContatos() {
      const lista = document.getElementById('contacts-list');
      const contatos = JSON.parse(localStorage.getItem('chat_recentes') || "[]");
      const targetAtual = new URLSearchParams(window.location.search).get('target');
      lista.innerHTML = contatos.map(nome => `
        <div class="contact-item ${targetAtual === nome ? 'active' : ''}" onclick="mudarSala('${[currentUser, nome].sort().join('_')}', '${nome}')">
          <div style="width:30px; height:30px; border:1px solid var(--neon-cyan); border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--neon-cyan);">${nome[0].toUpperCase()}</div>
          ${nome.toUpperCase()}
        </div>
      `).join('');
    }

    document.getElementById('form').onsubmit = (e) => {
      e.preventDefault(); const input = document.getElementById('input');
      if(input.value.trim() && socket) { socket.emit('chat message', { text: input.value }); input.value = ''; }
    };

    function apagarHistoricoParaAmbos() {
      const room = new URLSearchParams(window.location.search).get('room');
      if(room && confirm("APAGAR TODAS AS MENSAGENS PARA AMBOS?")) socket.emit('request clear', room);
    }

    function logout() { localStorage.clear(); location.reload(); }
    function fecharChatNoCelular() { document.body.classList.remove('chat-open'); window.history.pushState({}, '', window.location.pathname); }

    /* OMNIGUARD - PROTEÇÃO ATIVA */
    (function() {
        document.addEventListener('keydown', e => { if (e.key === "F12" || (e.ctrlKey && e.shiftKey && "IJC".includes(e.key)) || (e.ctrlKey && e.key === "U")) { e.preventDefault(); playErrorBeep(); return false; } });
        setInterval(() => { (function() { (function() { debugger; }()); }()); }, 500);
        document.addEventListener('contextmenu', e => { e.preventDefault(); playErrorBeep(); });
    })();
  </script>
</body>
</html>
