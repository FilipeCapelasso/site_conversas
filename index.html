<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;
    let currentUser = "";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyNgvP69t-velhggxX_L2Nu5WreTDAcWW9w27xWRoDwFfjcd_oR2Pdx81KzZCYMRWA/exec";

    // Funções auxiliares (playErrorBeep, fazerLogin, etc) permanecem as mesmas...

    function iniciarChat() {
      // Se já houver um socket, vamos apenas mudar a sala, não desconectar tudo
      // para não perder notificações enquanto troca de tela.
      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room') || 'global';
      const target = urlParams.get('target');

      document.getElementById('chat-title').innerText = target ? target : "🌎 Chat Global";
      document.getElementById('del-btn').style.display = (target && room !== 'global') ? "block" : "none";
      document.getElementById('remove-contact-btn').style.display = (target && room !== 'global') ? "block" : "none";
      
      document.getElementById('messages').innerHTML = "";
      renderizarContatos();

      // Se o socket não existe, cria. Se existe, apenas muda de sala (join).
      if (!socket) {
        socket = io({ query: { room: room, username: currentUser } });
        configurarOuvintes();
      } else {
        socket.emit('leave room'); // Opcional: criar evento no server para limpar salas antigas
        socket.disconnect(); // Para simplificar com sua lógica atual, vamos reconectar
        socket = io({ query: { room: room, username: currentUser } });
        configurarOuvintes();
      }
    }

    function configurarOuvintes() {
      socket.on('chat message', (data) => {
        const item = document.createElement('li');
        const isMe = data.username === currentUser;
        item.className = `msg-box ${isMe ? 'sent' : 'received'}`;
        let html = `<small style="display:block; font-weight:bold; opacity:0.6; margin-bottom:4px;">${data.username}</small>`;
        if (data.file) {
          if (data.fileType === 'image') html += `<img src="${data.file}">`;
          else if (data.fileType === 'video') html += `<video src="${data.file}" controls></video>`;
        } else {
          html += `<span>${data.text}</span>`;
        }
        item.innerHTML = html;
        document.getElementById('messages').appendChild(item);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      });

      // ESTA É A PARTE QUE CORRIGE O SEU PROBLEMA
      socket.on('notify contact', (data) => {
        if (data.to.toLowerCase() === currentUser.toLowerCase()) {
          let contatos = JSON.parse(localStorage.getItem('chat_recentes') || "[]");
          if (!contatos.includes(data.from)) {
            contatos.push(data.from);
            localStorage.setItem('chat_recentes', JSON.stringify(contatos));
            renderizarContatos();
          }
          
          // Se o destinatário já estiver com a aba dessa pessoa aberta, 
          // mas em uma sala "errada" (ordem dos nomes), isso ajuda a sincronizar.
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('target') === data.from && urlParams.get('room') !== data.room) {
             window.history.pushState({}, '', `?room=${data.room}&target=${data.from}`);
          }
        }
      });

      socket.on('clear messages', () => { document.getElementById('messages').innerHTML = ""; });
    }

    function mudarSala(novaSala, target = null) {
      if (target) {
        let contatos = JSON.parse(localStorage.getItem('chat_recentes') || "[]");
        if (!contatos.includes(target)) {
          contatos.push(target);
          localStorage.setItem('chat_recentes', JSON.stringify(contatos));
        }
      }
      const novaUrl = target ? `?room=${novaSala}&target=${target}` : `?room=global`;
      window.history.pushState({}, '', novaUrl);
      document.body.classList.add('chat-open');
      iniciarChat();
    }

    // ... (restante do código: buscarUsuariosSugestao, renderizarContatos, form.onsubmit) ...
</script>
